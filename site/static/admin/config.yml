backend:
  name: github
  repo: "testcrmax/TheLoneMoon"
  branch: "master"
  client_id: "Ov23li7T7WKTcawPqwwG"

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

publish_mode: editorial_workflow

collections:
  - name: "pages"
    label: "Pages"
    folder: "site/content"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
