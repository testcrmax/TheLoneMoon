name: Regenerate lockfile

on:
  workflow_dispatch:

jobs:
  regen-lockfile:
    name: Regenerate yarn.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack and prepare yarn
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Install dependencies (yarn)
        run: yarn install

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yarn.lock package-lock.json || true
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit"
          else
            git commit -m "chore: regenerate lockfile after dependency updates"
            git push
          fi
